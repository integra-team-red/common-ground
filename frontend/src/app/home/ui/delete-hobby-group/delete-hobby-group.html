<p-button (click)="openDialog()" icon="pi pi-trash" label="Delete Hobby Group" variant="text"></p-button>

<p-dialog [(visible)]="visible" [modal]="true" [style]="{ width: '25rem' }" appendTo="body" header="Delete Hobby Group">

    <p class="m-0 mb-6">
        Do you want to delete <strong>{{ hobbyGroupDto()?.name || 'this hobby group' }}</strong>?<br>
        Changes will be irreversible.
    </p>

    <div class="flex gap-4 mt-1 w-full">
        <p-button (click)="visible.set(false)" [outlined]="true" class="w-full" label="Cancel" severity="secondary"
            styleClass="w-full"></p-button>
        <p-button (click)="confirmDelete()" class="w-full" label="Delete" severity="primary"
            styleClass="w-full"></p-button>
    </div>

</p-dialog>
