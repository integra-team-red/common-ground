@if (loading()) {

    <p-card class="min-h-[200px]">
        <ng-template #title>
            <h3>
                <p-skeleton class="mb-3" height="20px" width="60%"></p-skeleton>
            </h3>
        </ng-template>

        <p>
            <p-skeleton class="mb-3" height="14px" width="100%"></p-skeleton>
        </p>

        <ng-template #footer>
            <div class="flex flex-row justify-between items-center">
                <div class="flex flex-shrink-0 whitespace-nowrap items-center">
                    <p-skeleton class="mr-2" shape="circle" size="2rem"></p-skeleton>
                    <p-skeleton height="14px" width="80px"></p-skeleton>
                </div>

                <div class="flex flex-row flex-wrap gap-2 justify-end">
                    <p-skeleton borderRadius="16px" height="24px" width="60px"></p-skeleton>
                    <p-skeleton borderRadius="16px" height="24px" width="50px"></p-skeleton>
                    <p-skeleton borderRadius="16px" height="24px" width="70px"></p-skeleton>
                </div>
            </div>

            <div class="flex gap-4 mt-2 -mb-4">
                <p-skeleton height="32px" width="80px"></p-skeleton>
            </div>
        </ng-template>
    </p-card>

} @else {

    <p-card class="min-h-[200px]">
        <ng-template #title>
            <h3>{{ hobbyGroupDto().name }}</h3>
        </ng-template>

        <p>
            {{ hobbyGroupDto().description }}
        </p>

        <ng-template #footer>
            <div class="flex flex-row justify-between items-center">
                <div class="flex flex-shrink-0 whitespace-nowrap">
                    <p-avatar class="mr-2" icon="pi pi-user" shape="circle"/>
                    <span>{{ hobbyGroupDto().owner?.username }}</span>
                </div>

                <div class="flex flex-row flex-wrap gap-2 justify-end">
                    @for (tag of cardTags(); track tag.id) {
                        <p-chip [label]="tag.label"/>
                    }
                </div>
            </div>

            <div class="flex gap-4 mt-2 -mb-4">
                @if (!isOwner()) {
                    @if (!isMember()) {
                        <p-button (click)="join()" icon="pi pi-plus-circle" label="Join" variant="text"/>
                    } @else {
                        <p-button (click)="leave()" icon="pi pi-minus-circle" label="Leave" variant="text"/>
                    }
                } @else {
                    <app-delete-hobby-group
                        (groupDeleted)="groupDeleted.emit()"
                        [hobbyGroupDto]="hobbyGroupDto()">
                    </app-delete-hobby-group>
                }
            </div>
        </ng-template>
    </p-card>

}
