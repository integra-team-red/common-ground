<p-dialog (onHide)="close()" [(visible)]="visible" [modal]="true" [style]="{ width: '25rem' }" dismissableMask="true"
  header="Confirm Deletion">
  <div class="mb-4">
    Are you sure you want to delete the location <strong>{{ locationDto().name }}</strong>? This action cannot be
    undone.
  </div>
  <div class="flex justify-end gap-2">
    <p-button (onClick)="close()" label="Cancel" severity="secondary"></p-button>
    <p-button (onClick)="onConfirm()" label="Delete" severity="danger"></p-button>
  </div>
</p-dialog>
