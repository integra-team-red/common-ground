<div class="hidden md:block">
    <p-table
            (onLazyLoad)="onLazyLoad($event)"
            [lazy]="true"
            [paginator]="true"
            [rows]="rows()"
            [tableStyle]="{ 'min-width': '50rem' }"
            [totalRecords]="totalRecords()"
            [value]="locations()"
    >
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Coordinates</th>
                <th>Actions</th>
            </tr>
        </ng-template>
        <ng-template let-location pTemplate="body">
            <tr>
                <td>{{ location.id }}</td>
                <td>{{ location.name }}</td>
                <td>{{ location.latitude }}, {{ location.longitude }}</td>
                <td>
                    <div class="flex gap-2">
                        <p-button (onClick)="onDelete(location)" icon="pi pi-trash" rounded severity="danger"
                                  text></p-button>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<div class="block md:hidden flex flex-col gap-3">
    @for (location of locations(); track location.id) {
        <div class="bg-surface-50 text-surface-950 border border-surface-200 rounded-xl
        p-4 shadow-sm flex flex-col gap-3">
            <div class="flex justify-between items-center border-b border-gray-200 pb-3 gap-4">

                <h3 class="font-bold text-lg text-gray-800 break-words m-0">{{ location.name }}</h3>

                <div class="shrink-0">
                    <p-button (onClick)="onDelete(location)" icon="pi pi-trash" rounded severity="danger"
                              text></p-button>
                </div>

            </div>

            <div class="flex flex-col gap-2 text-sm">

                <div class="flex justify-between items-center">
                    <span class="font-semibold text-gray-500">Coordinates:</span>
                    <span class="text-gray-700 text-right">{{ location.latitude }}, {{ location.longitude }}</span>
                </div>

                <div class="flex justify-between items-center mt-1">
                    <span class="font-semibold text-gray-500">ID:</span>
                    <span class="text-xs text-gray-400 truncate max-w-[180px]"
                          [title]="location.id">{{ location.id }}</span>
                </div>

            </div>
        </div>
    }
</div>
