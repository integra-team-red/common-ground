<p-table
        (onLazyLoad)="onLazyLoad($event)"
        [lazy]="true"
        [paginator]="true"
        [rows]="rows()"
        [tableStyle]="{ 'min-width': '50rem' }"
        [totalRecords]="totalRecords()"
        [value]="locations()"
>
    <ng-template pTemplate="header">
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Coordinates</th>
            <th>Actions</th>
        </tr>
    </ng-template>
    <ng-template let-location pTemplate="body">
        <tr>
            <td>{{ location.id }}</td>
            <td>{{ location.name }}</td>
            <td>{{ location.latitude }}, {{ location.longitude }}</td>
            <td>
                <div class="flex gap-2">
                    <p-button (onClick)="onDelete(location)" icon="pi pi-trash" rounded severity="danger"
                              text></p-button>
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>
