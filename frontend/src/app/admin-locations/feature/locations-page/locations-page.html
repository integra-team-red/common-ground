<div class="mt-4 flex flex-col gap-6 p-0 md:p-6">
    <div class="flex flex-col md:flex-row md:items-center w-full gap-4">
        <h2 class="text-2xl md:text-3xl whitespace-nowrap font-bold text-center md:text-left w-full md:w-auto">Admin:
            Locations View</h2>
        <div class="flex flex-col md:flex-row w-full md:w-auto grow md:justify-end gap-3 md:gap-2">
            <div class="w-full md:w-auto">
                <app-searchbar (search)="onSearch($event)" class="block w-full"></app-searchbar>
            </div>
            <div class="w-full md:w-auto">
                <p-button (onClick)="openCreateDialog()" label="Create New Location" styleClass="w-full"></p-button>
            </div>
        </div>
    </div>
    <div class="w-full border border-gray-300 rounded-xl overflow-hidden">
        <div class="w-full overflow-x-auto">
            <app-locations-table
                (delete)="openDeleteDialog($event)"
                (pageChange)="onPageChange($event)"
                [locations]="locations()"
                [rows]="rows()"
                [totalRecords]="totalElements()">
            </app-locations-table>
        </div>
    </div>
</div>

<app-create-edit-location-dialog (saved)="handleCreateDialogSubmit($event)"
    [(visible)]="openCreateDialogVisible"/>
<app-delete-location-dialog (confirmed)="handleDeleteDialogSubmit($event)" [(visible)]="openDeleteDialogVisible"
    [locationDto]="selectedLocation()"/>
