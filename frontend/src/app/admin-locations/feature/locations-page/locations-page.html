<div class="flex flex-col">
  <div class="flex flex-row justify-between mb-10">
    <h2 class="font-bold text-3xl">Admin: Locations View</h2>
    <div class="flex flex-row gap-4">
      <app-search-bar (search)="onSearch($event)"></app-search-bar>
      <p-button (onClick)="openCreateDialog()" label="Create New Location"/>
    </div>
  </div>
  <app-locations-table
    (delete)="openDeleteDialog($event)"
    (pageChange)="onPageChange($event)"
    [locations]="locations()"
    [rows]="rows()"
    [totalRecords]="totalElements()"/>
</div>

<app-create-edit-location-dialog (saved)="handleCreateDialogSubmit($event)" [(visible)]="openCreateDialogVisible"
  [locationDto]="selectedLocation()"/>
<app-delete-location-dialog (confirmed)="handleDeleteDialogSubmit($event)" [(visible)]="openDeleteDialogVisible"
  [locationDto]="selectedLocation()"/>
