<p-table (onLazyLoad)="loadEventsLazy($event)" [lazy]="true" [paginator]="true" [rows]="rows()"
  [scrollable]="true" [showCurrentPageReport]="true" [tableStyle]="{ 'min-width': '50rem' }"
  [totalRecords]="totalRecords()"
  [value]="events()">
  <ng-template pTemplate="header">
    <tr>
      <th>Id</th>
      <th>Title</th>
      <th>Start Time</th>
      <th>End Time</th>
      <th>Location Id</th>
      <th>Hobby Group Id</th>
      <th>Actions</th>
    </tr>
  </ng-template>
  <ng-template let-event pTemplate="body">
    <tr>
      <td>{{ event.id }}</td>
      <td>{{ event.title }}</td>
      <td>{{ event.startTime | date: 'short' }}</td>
      <td>{{ event.endTime | date: 'short' }}</td>
      <td>{{ event.locationId }}</td>
      <td>{{ event.hobbyGroupId }}</td>
      <td>
        <div class="flex flex-row gap-2">
          <app-update-event (refreshTable)="refresh.emit()" [eventData]="event"></app-update-event>
          <app-delete-event (refreshTable)="refresh.emit()" [eventData]="event"></app-delete-event>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
