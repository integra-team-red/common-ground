<p-table
    [value]="events()"
    [tableStyle]="{ 'min-width': '50rem' }"
    [scrollable]="true"
    [lazy]="true"
    (onLazyLoad)="loadEventsLazy($event)"
    [paginator]="true"
    [rows]="rows()"
    [totalRecords]="totalRecords()"
    [showCurrentPageReport]="true"
>
    <ng-template pTemplate="header">
        <tr>
            <th>Id</th>
            <th>Title</th>
            <th>Start Time</th>
            <th>End Time</th>
            <th>Location Id</th>
            <th>Hobby Group Id</th>
            <th>Actions</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-event>
        <tr>
            <td>{{ event.id }}</td>
            <td>{{ event.title }}</td>
            <td>{{ event.startTime | date: 'short' }}</td>
            <td>{{ event.endTime | date: 'short' }}</td>
            <td>{{ event.locationId }}</td>
            <td>{{ event.hobbyGroupId }}</td>
            <td>
                <div class="flex flex-row gap-2">
                    <app-update-event [eventData]="event" (refreshTable)="refresh.emit()"></app-update-event>
                    <app-delete-event [eventData]="event" (refreshTable)="refresh.emit()"></app-delete-event>
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>
