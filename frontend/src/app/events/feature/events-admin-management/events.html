<div class="mt-4 flex flex-col gap-6 p-0 md:p-6">
    <div class="flex flex-col md:flex-row items-center w-full gap-4">
        <h2 class="text-2xl md:text-3xl whitespace-nowrap font-bold ">Event Management</h2>
        <div class="flex flex-col md:flex-row w-full md:w-auto grow md:justify-end gap-3 md:gap-2">
            <div class="w-full md:w-auto">
                <app-searchbar (search)="onSearch($event)"></app-searchbar>
            </div>
            <div class="w-full md:w-auto">
                <app-create-event (refreshTable)="getEvents()"></app-create-event>
            </div>
        </div>
    </div>
    <div class="w-full border border-gray-300 rounded-xl overflow-hidden">
        <div class="w-full overflow-x-auto">
            <app-events-table
                (lazyEvent)="loadEventsLazy($event)"
                (refresh)="getEvents()"
                [events]="events()"
                [rows]="rows()" [totalRecords]="totalRecords()">
            </app-events-table>
        </div>
    </div>
</div>
