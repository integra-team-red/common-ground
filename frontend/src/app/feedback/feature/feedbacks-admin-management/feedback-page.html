<p-toast></p-toast>

<div class="mt-4 flex flex-col gap-6 p-6">
  <div class="flex flex-row items-center w-full gap-4">
    <h2 class="text-3xl whitespace-nowrap font-bold ">Admin: Feedback Management</h2>

    <div class="flex flex-row grow justify-end gap-3">
      <div class="grow max-w-md">
        <p-iconfield class="w-full">
          <p-inputicon class="pi pi-search"/>
          <input (keyup.enter)="getFeedbacks()"
            [(ngModel)]="searchQuery"
            class="w-full"
            pInputText
            placeholder="Search by email ..."
            type="text"/>
        </p-iconfield>
      </div>

      <app-create-feedback (refreshTable)="getFeedbacks()"></app-create-feedback>
    </div>
  </div>
  <div class="w-full overflow-x-auto">
    <app-feedback-table
      (lazyEvent)="loadFeedbacksLazy($event)"
      (refresh)="getFeedbacks()"
      [feedbacks]="feedbacks()"
      [rows]="rows()"
      [totalRecords]="totalRecords()">
    </app-feedback-table>
  </div>
</div>
