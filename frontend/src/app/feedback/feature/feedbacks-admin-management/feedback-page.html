
<div class="mt-4 flex flex-col gap-6 p-0 sm:p-6">
    <div class="flex flex-col sm:flex-row items-center w-full gap-4">
        <h2 class=" text-2xl sm:text-3xl font-bold whitespace-nowrap"
        >Admin: Feedback Management</h2>

        <div class="flex flex-col sm:flex-row grow justify-end gap-3">
            <div class="grow max-w-md">
                <p-iconfield class="w-full">
                    <p-inputicon class="pi pi-search"/>
                    <input type="text"
                           pInputText
                           placeholder="Search by email ..."
                           class="w-full"
                           [(ngModel)]="searchQuery"
                           (keyup.enter)="getFeedbacks()"/>
                </p-iconfield>
            </div>

            <app-create-feedback (refreshTable)="getFeedbacks()"></app-create-feedback>
        </div>
    </div>
    <div class="w-full overflow-x-auto">
        <app-feedback-table
                [feedbacks]="feedbacks()"
                [rows]="rows()"
                [totalRecords]="totalRecords()"
                (refresh)="getFeedbacks()"
                (lazyEvent)="loadFeedbacksLazy($event)">
        </app-feedback-table>
    </div>
</div>
