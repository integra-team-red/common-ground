<p-table [value]="feedbacks()" [lazy]="true" (onLazyLoad)="loadFeedbacksLazy($event)"
         [paginator]="true" [rows]="rows()" [totalRecords]="totalRecords()" [scrollable]="true">
    <ng-template pTemplate="header">
        <tr>
            <th>Id</th>
            <th>Email</th>
            <th>Message</th>
            <th>Created At</th>
            <th>Actions</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-feedback>
        <tr>
            <td>{{ feedback.id }}</td>
            <td>{{ feedback.email }}</td>
            <td>{{ feedback.message }}</td>
            <td>{{ feedback.createdAt | date: 'short' }}</td>
            <td>
                <div class="flex flex-row gap-2">
                    <app-delete-feedback
                        [feedbackData]="feedback"
                        (refreshTable)="refresh.emit()">
                    </app-delete-feedback>
                    <app-update-feedback
                            [feedbackData]="feedback"
                            (refreshTable)="refresh.emit()">
                    </app-update-feedback>
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>
