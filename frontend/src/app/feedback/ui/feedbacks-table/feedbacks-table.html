<p-table (onLazyLoad)="loadFeedbacksLazy($event)" [lazy]="true" [paginator]="true"
  [rows]="rows()" [scrollable]="true" [totalRecords]="totalRecords()" [value]="feedbacks()">
  <ng-template pTemplate="header">
    <tr>
      <th>Id</th>
      <th>Email</th>
      <th>Message</th>
      <th>Created At</th>
      <th>Actions</th>
    </tr>
  </ng-template>
  <ng-template let-feedback pTemplate="body">
    <tr>
      <td>{{ feedback.id }}</td>
      <td>{{ feedback.email }}</td>
      <td>{{ feedback.message }}</td>
      <td>{{ feedback.createdAt | date: 'short' }}</td>
      <td>
        <div class="flex flex-row gap-2">
          <app-delete-feedback
            (refreshTable)="refresh.emit()"
            [feedbackData]="feedback">
          </app-delete-feedback>
          <app-update-feedback
            (refreshTable)="refresh.emit()"
            [feedbackData]="feedback">
          </app-update-feedback>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
