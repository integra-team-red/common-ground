<p-dialog (onHide)="onHide()" [modal]="true" [style]="{ width: '25rem' }" [visible]="visible()" header="Add new tag">
  <form #tagForm="ngForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    <div class="flex flex-col gap-1">
      <label for="label">Label</label>
      <input #tagLabel="ngModel"
        [(ngModel)]="newTag.label"
        [invalid]="tagLabel.invalid && (tagLabel.touched || tagForm.submitted)"
        autocomplete="off"
        id="label"
        name="tagLabel"
        pInputText
        required
        type="text"/>
      @if (tagLabel.invalid && (tagLabel.touched || tagForm.submitted)) {
        <p-message severity="error" size="small" variant="simple">Label is required</p-message>
      }
    </div>
    <p-button [disabled]="tagForm.invalid" label="Submit" severity="secondary" type="submit"/>
  </form>
</p-dialog>
