<div class="hidden md:block">
    <p-table (onLazyLoad)="loadTagsLazy($event)" [lazy]="true" [paginator]="true" [rows]="rows"
        [scrollable]="true" [tableStyle]="{ 'min-width': '50rem' }" [totalRecords]="totalRecords()" [value]="tags()">
        <ng-template #header>
            <tr>
                <th>Id</th>
                <th>Label</th>
                <th>Normalized Label</th>
                <th>Actions</th>
            </tr>
        </ng-template>
        <ng-template #body let-tag>
            <tr>
                <td>{{ tag.id }}</td>
                <td>
                    <p-chip>
                        <span style="white-space: pre">{{ tag.label }}</span>
                    </p-chip>
                </td>
                <td>{{ tag.normalizedLabel }}</td>
                <td>
                    <div class="flex gap-2">
                        <p-button (click)="updateClick.emit(tag.id)" icon="pi pi-pencil" severity="secondary"/>
                        <p-button (click)="deleteClick.emit(tag.id)" icon="pi pi-trash"/>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<div class="block md:hidden flex flex-col gap-3">
    @for (tag of tags(); track tag.id) {
        <div class="bg-surface-50 text-surface-950 border border-surface-200 rounded-xl
        p-4 shadow-sm flex flex-col gap-3">
            <div class="flex justify-between items-center border-b border-gray-200 pb-3 gap-2">

                <div class="overflow-hidden">
                    <p-chip>
                        <span [title]="tag.label" class="truncate max-w-[150px] sm:max-w-[200px]"
                            style="white-space: pre">{{ tag.label }}</span>
                    </p-chip>
                </div>

                <div class="flex gap-2 shrink-0">
                    <p-button (click)="updateClick.emit(tag.id || 0)" icon="pi pi-pencil"
                        severity="secondary"></p-button>
                    <p-button (click)="deleteClick.emit(tag.id || 0)" icon="pi pi-trash"></p-button>
                </div>

            </div>

            <div class="flex flex-col gap-1 text-sm">

                <div class="flex justify-between items-center">
                    <span class="font-semibold text-gray-500">Normalized:</span>
                    <span [title]="tag.normalizedLabel"
                        class="text-gray-700 truncate max-w-[180px]">{{ tag.normalizedLabel }}</span>
                </div>

                <div class="flex justify-between items-center mt-1">
                    <span class="font-semibold text-gray-500">ID:</span>
                    <span [title]="tag.id" class="text-xs text-gray-400 truncate max-w-[180px]">{{ tag.id }}</span>
                </div>

            </div>
        </div>
    }
</div>
