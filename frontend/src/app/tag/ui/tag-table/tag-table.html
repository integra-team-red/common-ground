<div class="hidden md:block">
    <p-table [value]="tags()" [tableStyle]="{ 'min-width': '50rem' }" [scrollable]="true" [lazy]="true"
             (onLazyLoad)="loadTagsLazy($event)" [paginator]="true" [rows]="rows" [totalRecords]="totalRecords()">
        <ng-template #header>
            <tr>
                <th>Id</th>
                <th>Label</th>
                <th>Normalized Label</th>
                <th>Actions</th>
            </tr>
        </ng-template>
        <ng-template #body let-tag>
            <tr>
                <td>{{ tag.id }}</td>
                <td>
                    <p-chip>
                        <span style="white-space: pre">{{ tag.label }}</span>
                    </p-chip>
                </td>
                <td>{{ tag.normalizedLabel }}</td>
                <td>
                    <div class="flex gap-2">
                        <p-button icon="pi pi-pencil" severity="secondary" (click)="updateClick.emit(tag.id)"/>
                        <p-button icon="pi pi-trash" (click)="deleteClick.emit(tag.id)"/>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<div class="block md:hidden flex flex-col gap-3">
    @for (tag of tags(); track tag.id) {
        <div class="bg-surface-50 text-surface-950 border border-surface-200 rounded-xl
        p-4 shadow-sm flex flex-col gap-3">
            <div class="flex justify-between items-center border-b border-gray-200 pb-3 gap-2">

                <div class="overflow-hidden">
                    <p-chip>
                        <span class="truncate max-w-[150px] sm:max-w-[200px]" style="white-space: pre"
                              [title]="tag.label">{{ tag.label }}</span>
                    </p-chip>
                </div>

                <div class="flex gap-2 shrink-0">
                    <p-button icon="pi pi-pencil" severity="secondary"
                              (click)="updateClick.emit(tag.id || 0)"></p-button>
                    <p-button icon="pi pi-trash" (click)="deleteClick.emit(tag.id || 0)"></p-button>
                </div>

            </div>

            <div class="flex flex-col gap-1 text-sm">

                <div class="flex justify-between items-center">
                    <span class="font-semibold text-gray-500">Normalized:</span>
                    <span class="text-gray-700 truncate max-w-[180px]"
                          [title]="tag.normalizedLabel">{{ tag.normalizedLabel }}</span>
                </div>

                <div class="flex justify-between items-center mt-1">
                    <span class="font-semibold text-gray-500">ID:</span>
                    <span class="text-xs text-gray-400 truncate max-w-[180px]" [title]="tag.id">{{ tag.id }}</span>
                </div>

            </div>
        </div>
    }
</div>
