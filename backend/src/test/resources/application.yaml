spring:
  datasource:
    url: jdbc:h2:mem:fake
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: test@gmail.com
    password: testpassword
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    version: openapi_3_0
  swagger-ui:
    path: /swagger-ui.html
  default-produces-media-type: application/json

matrix:
  admin:
    token: token
  server-name: server
  base-url: url
  registration-shared-secret: secret
